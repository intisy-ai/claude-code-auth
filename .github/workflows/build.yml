name: Publish Java Provider

on:
  push:
    tags:
      - '[0-9]*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - run: chmod +x java/gradlew
      # Exclude the test tasks: :claude-provider's integration test depends on io.github.intisy:jvm
      # (a side-by-side ai-java checkout, absent in CI), so compiling/running tests can't resolve.
      # We only need the jar + publishGithub. The built-in github.token (with contents:write above)
      # suffices for creating a release in THIS repo -- no org PAT secret required. Tag pattern is
      # numeric ('[0-9]*') so it never collides with this repo's npm publish workflow, which
      # triggers on 'v*' tags.
      - name: Publish claude-provider jar as a github-gradle package
        working-directory: java
        run: ./gradlew :claude-provider:jar :claude-provider:publishGithub -Partifact_version=${{ github.ref_name }} -x test -x compileTestJava
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ github.token }}
